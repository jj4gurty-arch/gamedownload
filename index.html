<!DOCTYPE html>
<html>
<head>
    <title>Download</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #000000, #0a0f1f, #001f3f);
            background-size: 400% 400%;
            animation: bgFlow 12s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        @keyframes bgFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Neon glow button */
        button {
            padding: 20px 60px;
            font-size: 28px;
            color: #00faff;
            background: transparent;
            border: 3px solid #00faff;
            border-radius: 12px;
            cursor: pointer;
            text-shadow: 0 0 10px #00faff;
            box-shadow: 0 0 20px #00faff, inset 0 0 20px #00faff;
            transition: 0.2s ease;
        }

        button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px #00faff, inset 0 0 30px #00faff;
        }

        /* Floating neon particles */
        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #00faff;
            border-radius: 50%;
            opacity: 0.7;
            animation: floatUp 6s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0.2; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 1; }
        }
    </style>
</head>

<body>

<button onclick="forceDownload()">Download</button>

<script>
function forceDownload() {
    const file = "desktop_petty.pyw.zip"; // <-- your file name

    const link = document.createElement("a");
    link.href = file;
    link.download = file;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

// Create floating neon particles
for (let i = 0; i < 40; i++) {
    let p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDelay = Math.random() * 5 + "s";
    p.style.opacity = Math.random();
    document.body.appendChild(p);
}
</script>

</body>
</html>
